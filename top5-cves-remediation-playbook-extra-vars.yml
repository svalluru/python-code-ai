---
# Parameterized CVE remediation playbook for use with AAP Job Template.
# Pass values via extra_vars when launching the job (e.g. POST /api/v2/job_templates/N/launch/).
#
# Extra vars (all optional if defaults are acceptable):
#   remediation_hosts:  Comma-separated host pattern, or YAML list of hostnames.
#                       Default: same 10 hosts as original playbook.
#   cve_list:           List of CVE IDs to remediate, e.g. ["CVE-2025-13601", "CVE-2025-39933"].
#                       Default: CVE-2025-13601, CVE-2025-39933, CVE-2025-68285, CVE-2025-68301, CVE-2025-9086.
#
# Example POST body for launch API:
#   {
#     "extra_vars": {
#       "remediation_hosts": "host1,host2,host3",
#       "cve_list": ["CVE-2025-13601", "CVE-2025-39933"]
#     }
#   }
# Or with hosts as list:
#   {
#     "extra_vars": {
#       "remediation_hosts": ["host1", "host2", "host3"],
#       "cve_list": ["CVE-2025-13601", "CVE-2025-39933"]
#     }
#   }

- name: update vulnerable packages
  hosts: "{{ _hosts_pattern }}"
  vars:
    _default_hosts: "control,dur-rhc01.hcc-lab.com,dur-rhc02.hcc-lab.com,dur-rhc03.hcc-lab.com,dur-rhc04.hcc-lab.com,dur-rhc05.hcc-lab.com,dur-rhc06.hcc-lab.com,dur-rhc07.hcc-lab.com,ral-db02.hcc-lab.com,ral-sec02.hcc-lab.com"
    _hosts_var: "{{ remediation_hosts | default(_default_hosts) }}"
    # List -> comma-separated string; string -> use as-is (string is sequence in Jinja, so check "not string")
    _hosts_pattern: "{{ (_hosts_var is sequence and _hosts_var is not string) | ternary(_hosts_var | join(','), _hosts_var) }}"
    _default_cves:
      - CVE-2025-13601
      - CVE-2025-39933
      - CVE-2025-68285
      - CVE-2025-68301
      - CVE-2025-9086
    # Build insights_issues string from cve_list (e.g. "--cve CVE-2025-13601 --cve CVE-2025-39933")
    insights_issues: "{{ (cve_list | default(_default_cves)) | map('regex_replace', '^', '--cve ') | join(' ') }}"
