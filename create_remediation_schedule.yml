---
# Create a one-time schedule on an AAP Job Template for a user-chosen date/time.
# Use this from a workflow: after an approval node, run a JT that runs this playbook.
# Pass scheduled_run_at and remediation_job_template_name via workflow survey or extra vars.
#
# Requirements:
#   - pip: ansible
#   - ansible-galaxy collection install awx.awx
#   - Job Template must have a Controller API credential (or set controller_* env vars).
#
# Extra vars (from workflow survey, JT default, or launch API body):
#   scheduled_run_at:          "YYYY-MM-DD HH:MM" (24-hour, UTC or set timezone below)
#   remediation_job_template_name:  Name of the JT to schedule (e.g. "Remediation - Top 5 CVEs")
#   remediation_extra_vars:    Optional dict of extra_vars to pass to the remediation job when the schedule runs.
#   You can pass these at the top level OR nested under "extra_vars" (e.g. JT default {"extra_vars": {"scheduled_run_at": "..."}}).
#   When using the GitLab webhook URL, use the launch endpoint with Bearer token to pass extra_vars.
# Optional:
#   controller_host:           AAP URL (if not from credential)
#   controller_username:       (if not from credential)
#   controller_password:       (if not from credential)
#   schedule_timezone:         "UTC" (default) - used only for display; rrule uses UTC from parsed time

- name: Create one-time schedule for remediation job
  hosts: localhost
  gather_facts: false
  vars: {}

  tasks:
    # Resolve input from top-level vars or from nested extra_vars (JT default often uses {"extra_vars": {...}})
    - name: Resolve extra vars (top-level or nested under extra_vars)
      ansible.builtin.set_fact:
        _scheduled_run_at: "{{ scheduled_run_at | default(extra_vars.scheduled_run_at | default('') if (extra_vars is defined and extra_vars is mapping) else '') }}"
        _remediation_job_template_name: "{{ remediation_job_template_name | default(extra_vars.remediation_job_template_name | default('Remediation - Top 5 CVEs') if (extra_vars is defined and extra_vars is mapping) else 'Remediation - Top 5 CVEs') }}"
        _remediation_extra_vars: "{{ remediation_extra_vars | default(extra_vars.remediation_extra_vars | default({}) if (extra_vars is defined and extra_vars is mapping) else {}) }}"
      when: extra_vars is defined or scheduled_run_at is defined or remediation_job_template_name is defined or remediation_extra_vars is defined

    - name: Resolve extra vars when no vars passed yet
      ansible.builtin.set_fact:
        _scheduled_run_at: ""
        _remediation_job_template_name: "Remediation - Top 5 CVEs"
        _remediation_extra_vars: {}
      when: extra_vars is not defined and scheduled_run_at is not defined and remediation_job_template_name is not defined and remediation_extra_vars is not defined

    # Normalize so we never run string/trim on a non-string
    - name: Normalize scheduled_run_at
      ansible.builtin.set_fact:
        scheduled_run_at_clean: "{{ _scheduled_run_at | trim }}"
      when: _scheduled_run_at is defined and _scheduled_run_at is string

    - name: Set empty scheduled_run_at when missing or not a string
      ansible.builtin.set_fact:
        scheduled_run_at_clean: ""
      when: _scheduled_run_at is not defined or _scheduled_run_at is not string

    - name: Derive date/time parts and rrule from scheduled_run_at_clean
      ansible.builtin.set_fact:
        _parts: "{{ (scheduled_run_at_clean.split(' ') + ['', '00:00'])[:2] }}"
      run_once: true

    - name: Set date and time facts
      ansible.builtin.set_fact:
        _date_part: "{{ _parts[0] }}"
        _time_part: "{{ _parts[1] }}"
      run_once: true

    - name: Set schedule rrule and name
      ansible.builtin.set_fact:
        _time_padded: "{{ (_time_part + ':00')[:8] if _time_part | length <= 5 else _time_part }}"
        schedule_rrule: "DTSTART:{{ _date_part.replace('-', '') }}T{{ ((_time_part + ':00')[:8] if _time_part | length <= 5 else _time_part).replace(':', '') }}Z RRULE:FREQ=MINUTELY;INTERVAL=1;COUNT=1"
        schedule_name: "Remediation one-time {{ scheduled_run_at_clean | replace(' ', '_') | replace(':', '') }}"
      run_once: true

    - name: Validate scheduled_run_at
      assert:
        that:
          - scheduled_run_at_clean | length > 0
          - _date_part | length == 10
        fail_msg: >-
          scheduled_run_at is required. Format: 'YYYY-MM-DD HH:MM' (e.g. 2026-03-15 02:00).
          To pass it from the UI: when launching, either (1) fill in the Survey field for scheduled_run_at,
          or (2) in the Launch form, open 'Extra Variables' and add: scheduled_run_at: "2026-03-20 14:00".
          In the Job Template: enable 'Prompt for extra variables' and add a Survey question with variable name 'scheduled_run_at'.
      run_once: true

    - name: Create one-time schedule on remediation job template
      awx.awx.schedule:
        name: "{{ schedule_name }}"
        state: present
        unified_job_template: "{{ _remediation_job_template_name }}"
        rrule: "{{ schedule_rrule }}"
        enabled: true
        description: "One-time run approved via workflow (requested {{ scheduled_run_at_clean }})"
        extra_data: "{{ _remediation_extra_vars }}"
      register: schedule_result
      run_once: true

    - name: Show schedule result
      ansible.builtin.debug:
        msg: >
          One-time schedule created successfully.
          Job template: {{ _remediation_job_template_name }}
          Run at (UTC): {{ scheduled_run_at_clean }}
          Schedule name: {{ schedule_name }}
          Next run will be triggered automatically by AAP at the scheduled time.
      run_once: true
      when: schedule_result is changed

    - name: Schedule already exists (idempotent)
      ansible.builtin.debug:
        msg: "Schedule '{{ schedule_name }}' already exists for {{ _remediation_job_template_name }}."
      run_once: true
      when: schedule_result is not changed
